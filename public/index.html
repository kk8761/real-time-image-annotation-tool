<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Real-Time Image Annotation Tool</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --accent-color: #58a6ff;
            --font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-primary);
            color: white;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .image-container {
            position: relative;
            width: 50%;
            padding-top: 56.25%; /* 16:9 aspect ratio */
            overflow: hidden;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .annotation-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .annotation-card:hover {
            transform: scale(1.05);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            background-color: var(--accent-color);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: darken(var(--accent-color), 10%);
        }
    </style>
</head>
<body>
    <header>
        <h1>Real-Time Image Annotation Tool</h1>
    </header>

    <section id="image-section">
        <div class="image-container" id="image-container">
            <img src="" alt="Image" id="annotation-image">
        </div>
        <div class="annotation-card" id="annotation-card">
            <h2>Annotations</h2>
            <ul id="annotations-list"></ul>
        </div>
    </section>

    <section class="controls">
        <button id="upload-button">Upload Image</button>
        <button id="export-button">Export Image</button>
    </section>

    <script src="/js/app.js"></script>
</body>
</html>
